name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - entrypoint.sh
  workflow_dispatch:
    inputs:
      runner_version:
        description: "GitHub Actions Runner version"
        required: false
        default: "2.333.1"
      nvm_version:
        description: "nvm version"
        required: false
        default: "0.40.4"
      node_version:
        description: "Default Node.js version (major)"
        required: false
        default: "24"
      use_cache:
        description: "Use build cache"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUNNER_VERSION=${{ github.event.inputs.runner_version || '2.333.1' }}
            NVM_VERSION=${{ github.event.inputs.nvm_version || '0.40.4' }}
            NODE_VERSION=${{ github.event.inputs.node_version || '24' }}
          cache-from: ${{ github.event.inputs.use_cache != 'false' && format('type=registry,ref={0}/{1}:buildcache', env.REGISTRY, env.IMAGE_NAME) || '' }}
          cache-to: ${{ github.event.inputs.use_cache != 'false' && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}
