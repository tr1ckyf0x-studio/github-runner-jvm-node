name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - entrypoint.sh
  workflow_dispatch:
    inputs:
      runner_version:
        description: "GitHub Actions Runner version (leave blank for Dockerfile default)"
        required: false
      nvm_version:
        description: "nvm version (leave blank for Dockerfile default)"
        required: false
      node_version:
        description: "Default Node.js version, major (leave blank for Dockerfile default)"
        required: false
      android_commandlinetools_version:
        description: "Android commandlinetools version (leave blank for Dockerfile default)"
        required: false
      android_platform_version:
        description: "Android platform version, e.g. 36 (leave blank for Dockerfile default)"
        required: false
      android_build_tools_version:
        description: "Android build-tools version, e.g. 36.0.0 (leave blank for Dockerfile default)"
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ github.event.inputs.runner_version && format('RUNNER_VERSION={0}', github.event.inputs.runner_version) || '' }}
            ${{ github.event.inputs.nvm_version && format('NVM_VERSION={0}', github.event.inputs.nvm_version) || '' }}
            ${{ github.event.inputs.node_version && format('NODE_VERSION={0}', github.event.inputs.node_version) || '' }}
            ${{ github.event.inputs.android_commandlinetools_version && format('ANDROID_COMMANDLINETOOLS_VERSION={0}', github.event.inputs.android_commandlinetools_version) || '' }}
            ${{ github.event.inputs.android_platform_version && format('ANDROID_PLATFORM_VERSION={0}', github.event.inputs.android_platform_version) || '' }}
            ${{ github.event.inputs.android_build_tools_version && format('ANDROID_BUILD_TOOLS_VERSION={0}', github.event.inputs.android_build_tools_version) || '' }}
