services:
  jvm-runner:
    container_name: github-jvm-runner
    image: ghcr.io/tr1ckyf0x-studio/github-runner-jvm-node:latest
    platform: ${RUNNER_PLATFORM:-linux/amd64}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Optional: set a custom runner name visible in GitHub Actions UI.
      # If not set, the runner will use an auto-generated name.
      RUNNER_NAME: ${RUNNER_NAME:-}
      # Persist the actions/setup-node (and other setup-* actions) tool cache
      # across container restarts so Node.js is not re-downloaded every time.
      RUNNER_TOOL_CACHE: /opt/hostedtoolcache
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - github-jvm-runner-gradle:/home/runner/.gradle
      - github-jvm-runner-m2:/home/runner/.m2
      - github-jvm-runner-npm:/home/runner/.npm
      - github-jvm-runner-tool-cache:/opt/hostedtoolcache

volumes:
  github-jvm-runner-gradle:
  github-jvm-runner-m2:
  github-jvm-runner-npm:
  github-jvm-runner-tool-cache:
